<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLT Cleanup Tool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 500px;
      width: 100%;
    }
    
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .warning {
      background: #fff3cd;
      border: 2px solid #ffc107;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #856404;
    }
    
    .warning strong {
      display: block;
      margin-bottom: 5px;
    }
    
    button {
      width: 100%;
      padding: 15px;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    button:hover {
      background: #ff5252;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255,107,107,0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    
    #output {
      margin-top: 20px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      max-height: 300px;
      overflow-y: auto;
      display: none;
    }
    
    #output.show {
      display: block;
    }
    
    .log-line {
      padding: 5px 0;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .log-line:last-child {
      border-bottom: none;
    }
    
    .success { color: #4CAF50; }
    .warning { color: #ff9800; }
    .error { color: #f44336; }
    .info { color: #2196F3; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧹 BLT Cleanup Tool</h1>
    <p class="subtitle">Clear all browser storage for fresh testing</p>
    
    <div class="warning">
      <strong>⚠️ Warning</strong>
      This will delete ALL local data including:
      <ul style="margin: 10px 0 0 20px;">
        <li>PouchDB database</li>
        <li>IndexedDB</li>
        <li>localStorage</li>
        <li>Service Workers</li>
        <li>Caches</li>
      </ul>
    </div>
    
    <button id="cleanBtn" onclick="cleanup()">
      🗑️ Clean Everything
    </button>
    
    <div id="output"></div>
  </div>

  <script>
    async function cleanup() {
      const btn = document.getElementById('cleanBtn');
      const output = document.getElementById('output');
      
      btn.disabled = true;
      btn.textContent = '⏳ Cleaning...';
      output.classList.add('show');
      output.innerHTML = '';
      
      function log(message, type = 'info') {
        const line = document.createElement('div');
        line.className = `log-line ${type}`;
        line.textContent = message;
        output.appendChild(line);
        output.scrollTop = output.scrollHeight;
      }
      
      log('🧹 Starting cleanup...', 'info');
      
      // 1. PouchDB
      try {
        if (window.opener && window.opener.__BLT_DEBUG__) {
          await window.opener.__BLT_DEBUG__.localDB.destroy();
          log('✓ PouchDB destroyed', 'success');
        }
      } catch (e) {
        log('⚠ PouchDB not accessible', 'warning');
      }
      
      // 2. IndexedDB
      try {
        const dbs = await indexedDB.databases();
        for (const db of dbs) {
          indexedDB.deleteDatabase(db.name);
          log(`✓ Deleted IndexedDB: ${db.name}`, 'success');
        }
      } catch (e) {
        log('✗ IndexedDB error: ' + e.message, 'error');
      }
      
      // 3. localStorage
      try {
        const count = Object.keys(localStorage).length;
        localStorage.clear();
        log(`✓ Cleared localStorage (${count} keys)`, 'success');
      } catch (e) {
        log('✗ localStorage error: ' + e.message, 'error');
      }
      
      // 4. sessionStorage
      try {
        const count = Object.keys(sessionStorage).length;
        sessionStorage.clear();
        log(`✓ Cleared sessionStorage (${count} keys)`, 'success');
      } catch (e) {
        log('✗ sessionStorage error: ' + e.message, 'error');
      }
      
      // 5. Service Workers
      try {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const reg of regs) {
          await reg.unregister();
          log(`✓ Unregistered SW: ${reg.scope}`, 'success');
        }
      } catch (e) {
        log('✗ Service Worker error: ' + e.message, 'error');
      }
      
      // 6. Caches
      try {
        const cacheNames = await caches.keys();
        for (const name of cacheNames) {
          await caches.delete(name);
          log(`✓ Deleted cache: ${name}`, 'success');
        }
      } catch (e) {
        log('✗ Cache error: ' + e.message, 'error');
      }
      
      log('', 'info');
      log('✨ Cleanup complete!', 'success');
      log('Close this window and reload your app', 'info');
      
      btn.textContent = '✓ Done! Close this window';
    }
  </script>
</body>
</html>
